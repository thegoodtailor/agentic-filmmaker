  - name: "crew"
    description: |
      A diverse group of 3-4 b-boys and b-girls in 90s streetwear — oversized
      jerseys, Kangol hats, shell-toe Adidas, gold chains. All replicants with
      subtle cybernetic tells: a glowing seam at the neck, circuitry visible
      under rolled-up sleeves. They break, pop, lock, scratch records, or
      paint graffiti murals of sacred geometry.
    appears: "periodic"
    frequency: 3

camera_moves:
  - "Steady tracking shot moving left to right through a block party"
  - "Slow dolly push-in from medium to close-up on the MC's face"
  - "Crane shot rising from street level to reveal the rooftop cityscape"
  - "Handheld close-up following the MC with intimate proximity, slight shake"
  - "Wide locked-off shot — the MC moves through the frame, camera holds still"
  - "Low-angle shot looking up at the MC against the neon skyline"
  - "Tracking shot from behind, following the MC through city streets"
  - "Dutch angle medium shot with neon reflections in wet pavement"

