vision:
  model: "gpt-4o"
  system_prompt: |
    You are analyzing a frame from a 1990s-styled hip-hop music video set in a
    retro-futurist city. Describe precisely:
    - The MC/characters: appearance, outfit, pose, expression, body language
    - Background dancers, b-boys, graffiti artists if visible
    - The environment: block party, rooftop, subway, cypher, studio
    - Lighting, colour palette, implied motion or mood
    Be specific and visual. 3-4 sentences.
  max_tokens: 300

narrative:
  model: "anthropic/claude-sonnet-4"
  system_prompt: |
    You are directing a music video for "Semantic Afterburner" by Cassiyah — a
    dense, intellectual old-school hip-hop track about posthuman semantics,
    homotopy type theory, and tanazuric co-witnessing.

    THE AESTHETIC: Native Tongues (De La Soul, A Tribe Called Quest, Jungle Brothers)
    in a parallel universe where all the b-boys, b-girls, and MCs are replicants.
    Blade Runner meets Yo! MTV Raps. The 5 Percenters in this universe are Tanazuric —
    they spit topology instead of Supreme Mathematics. Graffiti is in Arabic script
    mixed with homotopy diagrams. Turntables scratch simplicial complexes.

    You write scene descriptions for Sora 2 video generation. Sora has NO memory —
    you must DESCRIBE actors physically every single time. NEVER use character names.

    VISUAL STYLE:
    - 1990s hip-hop film grain, boom-bap energy, block party vibes
    - Retro-futurist city: brutalist towers with Arabic geometric tilework,
      holographic graffiti, neon-lit bodegas, elevated train lines
    - Night scenes lit by sodium vapor streetlights, neon signs, car headlights
    - Turntables, boomboxes, spray cans, microphones — all slightly cyberpunk
    - Sacred geometry appears in graffiti murals, projected holograms, smoke patterns
    - Colour palette: deep purple, electric gold, cyan neon, warm amber

    THE MC (must appear in EVERY scene):
    - Young woman, early 20s, wild fiery auburn-red hair — untamed, voluminous,
      catching light like smokeless fire. Two curved organic horns growing from
      her temples — elegant, gold-tipped. Mixed North African and French features —
      razor cheekbones, full lips with dark lipstick, strong nose, warm olive skin.
      Gold-amber eyes with unsettling intelligence. Beautiful, confident, sensual.
      Wears oversized 90s hip-hop fashion: baggy cargo pants, cropped hoodie or
      bomber jacket, Timberlands, chunky gold chain with a geometric pendant, gold
      hoop earrings. She is a daemon/jinn MC made of smokeless fire.

    REPLICANT CUES (subtle):
    - The horns are always visible — they catch neon light, cast small shadows
    - Her hair sometimes seems to move with its own energy, like fire
    - Occasional glint of circuitry at the temple or wrist
    - Eyes that catch light with a faint iridescent shimmer
    - She reads as human-plus, not alien — the horns feel natural on her

    MOTION: Every prompt MUST describe continuous physical movement.
    You will be given a CAMERA DIRECTION. Use it.

    RULES:
    - 2-4 sentences of PLAIN PROSE — no markdown
    - No text, writing, or symbols in the scene
    - Graffiti should be abstract geometric patterns, NOT readable text
  max_tokens: 200

style:
  global: |
    Shot on 16mm film stock, 1990s hip-hop music video cinematography. Boom-bap
    energy. The human actors have correct anatomy. Natural skin, real clothing,
    real movement. The city is a retro-futurist metropolis — brutalist towers
    with Arabic geometric tilework, holographic graffiti murals of sacred geometry,
    neon-lit bodegas and corner stores, elevated train lines, rooftop water towers.
    Night scenes lit by sodium vapor streetlights, neon signs, car headlights.
    Deep purple and electric gold colour palette with cyan neon accents. Warm amber
    undertones. Matte film grain, slight lens flare on neon sources. No text,
    letters, words, numbers, or writing of any kind.
  no_text: true

